<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Murder Mystery Spel</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h1>Murder Mystery</h1>
<p class="subtitle">Speel samen, elk vanaf je eigen scherm</p>

<!-- HOME -->
<div class="container" id="home">
  <button onclick="showScreen('create-setup')">Lobby aanmaken (host)</button>
  <button class="secondary" onclick="showScreen('join-setup')">Lobby joinen</button>
</div>

<!-- HOST: SETUP -->
<div class="container hidden" id="create-setup">
  <label>Jouw naam: <input type="text" id="hostName" placeholder="Naam"></label>
  <label>Aantal moordenaars: <input type="number" id="numMurderers" value="1" min="1"></label>
  <label>Aantal sheriffs: <input type="number" id="numSheriffs" value="1" min="0"></label>
  <button onclick="createLobby()">Lobby maken</button>
  <p class="error" id="createError"></p>
  <button class="secondary" onclick="showScreen('home')">Terug</button>
</div>

<!-- HOST: LOBBY (waiting room) -->
<div class="container hidden" id="host-lobby">
  <p class="note">Deel deze code met je vrienden:</p>
  <div class="code-display" id="lobbyCodeDisplay"></div>
  <p class="note" id="hostRequirement"></p>
  <ul class="player-list" id="hostPlayerList"></ul>
  <button id="startRoundBtn" onclick="startRound()" disabled>Start ronde</button>
  <button class="secondary" onclick="deleteLobby()">Lobby verwijderen</button>
  <p class="error" id="hostError"></p>
</div>

<!-- JOIN: SETUP -->
<div class="container hidden" id="join-setup">
  <label>Lobby code: <input type="text" id="joinCode" style="text-transform:uppercase" maxlength="6" placeholder="ABCD12"></label>
  <label>Jouw naam: <input type="text" id="joinName" placeholder="Naam"></label>
  <button onclick="joinLobby()">Join</button>
  <p class="error" id="joinError"></p>
  <button class="secondary" onclick="showScreen('home')">Terug</button>
</div>

<!-- JOIN: WAITING / GAME VIEW -->
<div class="container hidden" id="player-view">
  <p class="note" id="waitingNote">Wachten tot de host de ronde start...</p>
  <ul class="player-list" id="playerPlayerList"></ul>
  <div class="role-display hidden" id="roleBox">
    <div id="roleHiddenState">
      <button onclick="revealRole()">Tik om je rol te zien</button>
    </div>
    <div id="roleShownState" class="hidden" onclick="revealRole()" style="cursor:pointer;">
      <span id="roleText"></span>
      <p class="tap-hint">(tik om te verbergen)</p>
    </div>
  </div>
</div>



<script src="script.js"></script>
</body>
</html>
